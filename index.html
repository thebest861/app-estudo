<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Estudo</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}
button, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
button{
    background:#22c55e;
    color:white;
}
.questao{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>📚 App de Estudo</h2>

<select id="materia">
<option value="portugues">Português</option>
<option value="matematica">Matemática</option>
<option value="ciencias">Ciências</option>
<option value="historia">História</option>
<option value="geografia">Geografia</option>
</select>

<button onclick="gerarProva()">Gerar 10 Questões</button>

<div id="area"></div>

</div>

<script>

// 🔊 VOZ
function falar(txt){
let msg = new SpeechSynthesisUtterance(txt);
msg.lang="pt-BR";
speechSynthesis.speak(msg);
}

// EMBARALHAR
function embaralhar(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

// GERAR QUESTÃO
function gerarQuestao(materia){

let pergunta, alternativas, correta, explicacao;

// PORTUGUÊS
if(materia==="portugues"){

let banco = [
["Na frase 'Ele é uma fera estudando', o sentido é:",["Real","Figurado","Formal","Informal"],1,"Fera quer dizer muito bom."],
["Qual é um substantivo?",["Correr","Casa","Bonito","Rápido"],1,"Casa é nome de coisa."],
["Qual é um adjetivo?",["Casa","Bonito","Correr","Mesa"],1,"Adjetivo é característica."],
["Qual está correto?",["Os menino feliz","Os meninos felizes","Menino felizes","Os menino felizs"],1,"Plural combina com plural."]
];

let q = banco[Math.floor(Math.random()*banco.length)];

pergunta = q[0];
alternativas = q[1];
correta = q[2];
explicacao = q[3];
}

// MATEMÁTICA
if(materia==="matematica"){
let a=Math.floor(Math.random()*50);
let b=Math.floor(Math.random()*50);
let r=a+b;

pergunta = a+" + "+b+" = ?";
alternativas = [r-1,r,r+1,r+2];
correta = 1;
explicacao = a+" + "+b+" = "+r;
}

// OUTRAS
if(materia==="ciencias"){
pergunta="A rotação da Terra causa:";
alternativas=["Dia e noite","Chuva","Vento","Lua"];
correta=0;
explicacao="A Terra gira → dia e noite.";
}

if(materia==="historia"){
pergunta="Os povos nômades:";
alternativas=["Mudam de lugar","Cidade","Estado","Indústria"];
correta=0;
explicacao="Eles mudavam de lugar.";
}

if(materia==="geografia"){
pergunta="Desigualdade territorial é:";
alternativas=["Diferença","Igualdade","Clima","Solo"];
correta=0;
explicacao="São diferenças.";
}

// 🔥 EMBARALHAR CORRETAMENTE
let op = alternativas.map((v,i)=>({txt:v,correta:i===correta}));
op = embaralhar(op);

// descobrir nova posição correta
let novaCorreta = op.findIndex(x=>x.correta);

return {
pergunta:pergunta,
op:op,
correta:novaCorreta,
explicacao:explicacao
};

}

// GERAR PROVA
let bancoQuestoes = [];

function gerarProva(){

bancoQuestoes = [];

let materia = document.getElementById("materia").value;
let html = "";

for(let i=1;i<=10;i++){

let q = gerarQuestao(materia);
bancoQuestoes.push(q);

html += `<div class="questao">
<b>${i}. ${q.pergunta}</b><br>`;

q.op.forEach((alt,index)=>{
html += `<label>
<input type="radio" name="q${i}" value="${index}"> ${alt.txt}
</label><br>`;
});

html += `<div id="exp${i}"></div></div>`;
}

html += `<button onclick="corrigir()">Corrigir</button>`;

document.getElementById("area").innerHTML = html;
}

// CORRIGIR
function corrigir(){

let acertos = 0;

for(let i=1;i<=10;i++){

let marcada = document.querySelector(`input[name=q${i}]:checked`);
let q = bancoQuestoes[i-1];
let exp = document.getElementById("exp"+i);

if(marcada && parseInt(marcada.value)===q.correta){
acertos++;
exp.innerHTML="✅ Acertou";
exp.style.color="green";
}else{
exp.innerHTML="❌ "+q.explicacao;
exp.style.color="red";
falar(q.explicacao);
}

}

alert("Você acertou "+acertos+" de 10");

}

</script>

</body>
</html>
