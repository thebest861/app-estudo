<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Estudo Infinito</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}
button, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
button{
    background:#22c55e;
    color:white;
}
.questao{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>Þ App Infinito</h2>

<select id="materia">
<option value="portugues">Portuguûˆs</option>
<option value="matematica">MatemûÀtica</option>
<option value="ciencias">Ciûˆncias</option>
<option value="historia">Histû°ria</option>
<option value="geografia">Geografia</option>
</select>

<button onclick="gerarProva()">Gerar 10 Questûçes</button>

<div id="area"></div>

</div>

<script>

function falar(txt){
let msg = new SpeechSynthesisUtterance(txt);
msg.lang="pt-BR";
speechSynthesis.speak(msg);
}

function rand(max){
return Math.floor(Math.random()*max);
}

function embaralhar(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// ÞË GERADOR INTELIGENTE
function gerarQuestao(materia){

let pergunta, alternativas, correta, explicacao;

// MATEMûTICA (NUNCA REPETE)
if(materia==="matematica"){

let a = rand(100);
let b = rand(100);
let op = rand(2);

if(op===0){
let r=a+b;
pergunta=`${a} + ${b} = ?`;
alternativas=[r,r+1,r-1,r+2];
correta=0;
explicacao=`${a} + ${b} = ${r}`;
}

if(op===1){
let r=a-b;
pergunta=`${a} - ${b} = ?`;
alternativas=[r,r+1,r-1,r+2];
correta=0;
explicacao=`${a} - ${b} = ${r}`;
}
}

// PORTUGUûS (VARIA FRASES)
if(materia==="portugues"){

let frases=[
"Ele ûˋ uma fera estudando",
"Ela voa nos estudos",
"Ele ûˋ um gûˆnio",
"Ela manda bem demais",
"Ele estuda como mûÀquina"
];

let f = frases[rand(frases.length)];

pergunta=`Na frase "${f}", o sentido ûˋ:`;
alternativas=["Real","Figurado","Formal","Informal"];
correta=1;
explicacao="NûÈo ûˋ literal, quer dizer muito bom.";
}

// CIûNCIAS
if(materia==="ciencias"){
pergunta="A Terra gira e isso causa:";
alternativas=["Dia e noite","Chuva","Vento","Lua"];
correta=0;
explicacao="A rotaûÏûÈo da Terra causa dia e noite.";
}

// HISTûRIA
if(materia==="historia"){
pergunta="Os povos nûÇmades:";
alternativas=["Mudam de lugar","Cidade","Estado","Indû¤stria"];
correta=0;
explicacao="Eles se moviam sempre.";
}

// GEOGRAFIA
if(materia==="geografia"){
pergunta="Desigualdade territorial ûˋ:";
alternativas=["DiferenûÏa","Igualdade","Clima","Solo"];
correta=0;
explicacao="SûÈo diferenûÏas entre regiûçes.";
}

// EMBARALHAR
let op = alternativas.map((v,i)=>({txt:v,correta:i===correta}));
op = embaralhar(op);

let novaCorreta = op.findIndex(x=>x.correta);

return {pergunta,op,correta:novaCorreta,explicacao};

}

// GERAR PROVA
let questoes=[];

function gerarProva(){

questoes=[];

let materia=document.getElementById("materia").value;
let html="";

for(let i=1;i<=10;i++){

let q = gerarQuestao(materia);
questoes.push(q);

html += `<div class="questao">
<b>${i}. ${q.pergunta}</b><br>`;

q.op.forEach((alt,index)=>{
html += `<label>
<input type="radio" name="q${i}" value="${index}"> ${alt.txt}
</label><br>`;
});

html += `<div id="exp${i}"></div></div>`;
}

html += `<button onclick="corrigir()">Corrigir</button>`;

document.getElementById("area").innerHTML=html;

}

// CORRIGIR
function corrigir(){

let acertos=0;

for(let i=1;i<=10;i++){

let marcada=document.querySelector(`input[name=q${i}]:checked`);
let q=questoes[i-1];
let exp=document.getElementById("exp"+i);

if(marcada && parseInt(marcada.value)===q.correta){
acertos++;
exp.innerHTML="ã Acertou";
exp.style.color="green";
}else{
exp.innerHTML="ã "+q.explicacao;
exp.style.color="red";
falar(q.explicacao);
}

}

alert("Vocûˆ acertou "+acertos+" de 10");

}

</script>

</body>
</html>
