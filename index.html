<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App de Estudo</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #38bdf8, #22c55e);
    padding: 20px;
    text-align: center;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    max-width: 600px;
    margin: auto;
}

button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
    font-size: 16px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.explicacao {
    margin-top: 10px;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="container">

<h2>📚 App de Estudo</h2>

<select id="materia" onchange="carregarAssuntos()">
<option value="">Escolha a matéria</option>
<option value="portugues">Português</option>
<option value="matematica">Matemática</option>
<option value="ciencias">Ciências</option>
<option value="historia">História</option>
<option value="geografia">Geografia</option>
</select>

<select id="assunto"></select>

<button onclick="gerar()">GERAR QUESTÃO</button>

<div id="area"></div>

</div>

<script>

function rand(max){ return Math.floor(Math.random()*max); }

// CARREGAR ASSUNTOS
function carregarAssuntos(){

let materia = document.getElementById("materia").value;
let assunto = document.getElementById("assunto");

let lista = [];

if(materia=="portugues"){
lista = ["sentido","substantivo","concordancia"];
}

if(materia=="matematica"){
lista = ["soma","subtracao"];
}

if(materia=="ciencias"){
lista = ["terra"];
}

if(materia=="historia"){
lista = ["nomadismo"];
}

if(materia=="geografia"){
lista = ["desigualdade"];
}

assunto.innerHTML = "";

lista.forEach(a=>{
assunto.innerHTML += `<option value="${a}">${a}</option>`;
});

}

// GERAR QUESTÃO
function gerar(){

let materia = document.getElementById("materia").value;
let assunto = document.getElementById("assunto").value;

let pergunta="", op=[], correta=0, explicacao="";

// PORTUGUÊS
if(materia=="portugues"){

if(assunto=="sentido"){
pergunta="Na frase 'Ele é uma fera estudando', o sentido é:";
op=["Real","Figurado","Formal","Informal"];
correta=1;
explicacao="Fera aqui quer dizer que ele é muito bom!";
}

if(assunto=="substantivo"){
pergunta="Qual é um substantivo?";
op=["Correr","Casa","Bonito","Rápido"];
correta=1;
explicacao="Casa é nome de coisa.";
}

if(assunto=="concordancia"){
pergunta="Qual está correto?";
op=["Os menino feliz","Os meninos felizes","Menino felizes","Os menino felizs"];
correta=1;
explicacao="Plural combina com plural.";
}

}

// MATEMÁTICA
if(materia=="matematica"){

let a = rand(20);
let b = rand(20);

if(assunto=="soma"){
let r = a+b;
pergunta=`${a} + ${b} = ?`;
op=[r-1,r,r+1,r+2];
correta=1;
explicacao=`${a} + ${b} = ${r}`;
}

if(assunto=="subtracao"){
let r = a-b;
pergunta=`${a} - ${b} = ?`;
op=[r-1,r,r+1,r+2];
correta=1;
explicacao=`${a} - ${b} = ${r}`;
}

}

// CIÊNCIAS
if(materia=="ciencias"){
pergunta="A Terra gira e causa:";
op=["Dia e noite","Chuva","Vento","Lua"];
correta=0;
explicacao="A Terra gira e temos dia e noite.";
}

// HISTÓRIA
if(materia=="historia"){
pergunta="Os povos nômades:";
op=["Mudam de lugar","Vivem em cidade","Plantam","Não viajam"];
correta=0;
explicacao="Eles mudavam sempre de lugar.";
}

// GEOGRAFIA
if(materia=="geografia"){
pergunta="Desigualdade territorial é:";
op=["Diferença entre regiões","Igualdade","Clima","Solo"];
correta=0;
explicacao="Alguns lugares são mais ricos que outros.";
}

// MOSTRAR
let html = `<h3>${pergunta}</h3>`;

op.forEach((o,i)=>{
html += `<button onclick="responder(${i},${correta},'${explicacao}')">${o}</button>`;
});

html += `<div id="explicacao" class="explicacao"></div>`;

document.getElementById("area").innerHTML = html;

}

// RESPONDER
function responder(i, correta, explicacao){

let div = document.getElementById("explicacao");

if(i==correta){
div.innerHTML="✅ Acertou!";
div.style.color="green";
}else{
div.innerHTML="❌ Errou! " + explicacao;
div.style.color="red";
}

}

</script>

</body>
</html>
