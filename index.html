<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let erros = {

// рџЋЇ CARREGAR ASSUNTOS
function carregarAssuntos(){

let materia = document.getElementById("materia").value;
let assunto = document.getElementById("assunto");

let lista = [];

if(materia=="portugues"){

}

// рџЋ® GERAR QUESTГѓO
function gerar(){

let materia = document.getElementById("materia").value;
let assunto = document.getElementById("assunto").value;

let pergunta, op, correta, explicacao, grafico="";

// PORTUGUГЉS
if(materia=="portugues"){

// MATEMГЃTICA
if(materia=="matematica"){

setTimeout(()=>{
let ctx=document.getElementById("grafico").getContext("2d");
new Chart(ctx,{
type:'bar',

}
});

if(assunto=="plano"){

<svg width="200" height="200">

<line x1="0" y1="100" x2="200" y2="100" stroke="black"/>

}

}

// OUTRAS MATГ‰RIAS SIMPLES
if(materia=="ciencias"){

}

if(materia=="historia"){

}

}

// MOSTRAR
let html = `<div class="question">

// рџ§  TREINO INTELIGENTE
function responder(i, correta, explicacao, materia){

}else{

}

}

// рџ“Љ RELATГ“RIO
function mostrarRelatorio(){

let ctx = document.getElementById("graficoErros");

if(!ctx) return;

new Chart(ctx,{
type:'bar',
data:{
labels:["Port","Mat","Cien","Hist","Geo"],
datasets:[{

erros.portugues,
erros.matematica,
erros.ciencias,
erros.historia,
erros.geografia
]
}]
}
});
}

</script>
