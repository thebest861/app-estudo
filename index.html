<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App de Estudos</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}
button, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}
button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}
.questao{
    margin-top:15px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
}
.explicacao{
    margin-top:5px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📚 App de Estudo</h2>

<select id="materia">
<option value="portugues">Português</option>
<option value="matematica">Matemática</option>
<option value="ciencias">Ciências</option>
<option value="historia">História</option>
<option value="geografia">Geografia</option>
</select>

<button onclick="gerarProva()">Gerar 10 Questões</button>

<div id="area"></div>

</div>

<script>

// 🔊 VOZ
function falar(txt){
    let msg = new SpeechSynthesisUtterance(txt);
    msg.lang = "pt-BR";
    speechSynthesis.speak(msg);
}

// 🔀 EMBARALHAR
function embaralhar(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

// 🎯 GERADOR DE QUESTÕES
function gerarQuestao(materia){

function rand(max){ return Math.floor(Math.random()*max); }

let pergunta, alternativas, correta, explicacao;

// ===== MATEMÁTICA (INFINITA) =====
if(materia==="matematica"){

    let a = rand(100);
    let b = rand(100);

    if(rand(2)==0){
        let r = a + b;
        pergunta = `${a} + ${b} = ?`;
        alternativas = [r, r+1, r-1, r+2];
        correta = 0;
        explicacao = `${a} + ${b} = ${r}`;
    } else {
        let r = a - b;
        pergunta = `${a} - ${b} = ?`;
        alternativas = [r, r+1, r-1, r+2];
        correta = 0;
        explicacao = `${a} - ${b} = ${r}`;
    }
}

// ===== PORTUGUÊS =====
if(materia==="portugues"){

    let nomes = ["João","Maria","Pedro","Ana","Lucas","Julia"];
    let coisas = ["fera","gênio","máquina","craque"];

    let tipo = rand(3);

    if(tipo==0){
        let n = nomes[rand(nomes.length)];
        let c = coisas[rand(coisas.length)];
        pergunta = `Na frase "${n} é um ${c} estudando", o sentido é:`;
        alternativas = ["Real","Figurado","Formal","Informal"];
        correta = 1;
        explicacao = "Quer dizer que ele é muito bom.";
    }

    if(tipo==1){
        pergunta = "Qual é um substantivo?";
        alternativas = ["Correr","Casa","Bonito","Rápido"];
        correta = 1;
        explicacao = "Substantivo é nome.";
    }

    if(tipo==2){
        pergunta = "Qual frase está correta?";
        alternativas = ["Os menino feliz","Os meninos felizes","Menino felizes","Os menino felizs"];
        correta = 1;
        explicacao = "Plural combina com plural.";
    }
}

// ===== CIÊNCIAS =====
if(materia==="ciencias"){

    let tipo = rand(3);

    if(tipo==0){
        pergunta = "A rotação da Terra causa:";
        alternativas = ["Dia e noite","Chuva","Vento","Lua"];
        correta = 0;
        explicacao = "A Terra gira e temos dia e noite.";
    }

    if(tipo==1){
        pergunta = "A Lua muda de forma porque:";
        alternativas = ["Fases da Lua","Vento","Chuva","Sol"];
        correta = 0;
        explicacao = "A Lua tem fases.";
    }

    if(tipo==2){
        pergunta = "A lupa serve para:";
        alternativas = ["Ampliar","Esfriar","Aquecer","Medir"];
        correta = 0;
        explicacao = "A lupa aumenta o tamanho.";
    }
}

// ===== HISTÓRIA =====
if(materia==="historia"){

    let tipo = rand(3);

    if(tipo==0){
        pergunta = "Os povos nômades:";
        alternativas = ["Mudam de lugar","Vivem fixos","Plantam","Pescam"];
        correta = 0;
        explicacao = "Eles mudavam sempre.";
    }

    if(tipo==1){
        pergunta = "Sedentários são:";
        alternativas = ["Ficam em um lugar","Viajam","Correm","Caçam"];
        correta = 0;
        explicacao = "Vivem fixos.";
    }

    if(tipo==2){
        pergunta = "As cidades surgiram quando:";
        alternativas = ["Pessoas se fixaram","Choveu","Fugiram","Sumiram"];
        correta = 0;
        explicacao = "As pessoas passaram a morar.";
    }
}

// ===== GEOGRAFIA =====
if(materia==="geografia"){

    let tipo = rand(3);

    if(tipo==0){
        pergunta = "Desigualdade territorial é:";
        alternativas = ["Diferença","Igualdade","Clima","Solo"];
        correta = 0;
        explicacao = "São diferenças entre regiões.";
    }

    if(tipo==1){
        pergunta = "População é:";
        alternativas = ["Número de pessoas","Solo","Clima","Planta"];
        correta = 0;
        explicacao = "População é quantidade de pessoas.";
    }

    if(tipo==2){
        pergunta = "Região é:";
        alternativas = ["Parte de um lugar","Rua","Casa","Cidade"];
        correta = 0;
        explicacao = "Região é uma parte.";
    }
}

// 🔀 EMBARALHAR
let op = alternativas.map((v,i)=>({txt:v,correta:i===correta}));
op = embaralhar(op);

let novaCorreta = op.findIndex(x=>x.correta);

return {
    pergunta,
    op,
    correta:novaCorreta,
    explicacao
};

}

// 🧪 GERAR PROVA
let questoes=[];

function gerarProva(){

questoes=[];

let materia=document.getElementById("materia").value;
let html="";

for(let i=1;i<=10;i++){

let q = gerarQuestao(materia);
questoes.push(q);

html += `<div class="questao">
<b>${i}. ${q.pergunta}</b><br>`;

q.op.forEach((alt,index)=>{
html += `<label>
<input type="radio" name="q${i}" value="${index}"> ${alt.txt}
</label><br>`;
});

html += `<div id="exp${i}" class="explicacao"></div></div>`;
}

html += `<button onclick="corrigir()">Corrigir</button>`;

document.getElementById("area").innerHTML=html;

}

// ✅ CORRIGIR
function corrigir(){

let acertos=0;

for(let i=1;i<=10;i++){

let marcada=document.querySelector(`input[name=q${i}]:checked`);
let q=questoes[i-1];
let exp=document.getElementById("exp"+i);

if(marcada && parseInt(marcada.value)===q.correta){
acertos++;
exp.innerHTML="✅ Acertou";
exp.style.color="green";
}else{
exp.innerHTML="❌ "+q.explicacao;
exp.style.color="red";
falar(q.explicacao);
}

}

alert("Você acertou "+acertos+" de 10");

}

</script>

</body>
</html>
