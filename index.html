<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Estudo PRO</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}

button, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.questao{
    margin-top:15px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
}

.explicacao{
    margin-top:5px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>📚 App de Estudo PRO</h2>

<select id="materia">
<option value="portugues">Português</option>
<option value="matematica">Matemática</option>
<option value="ciencias">Ciências</option>
<option value="historia">História</option>
<option value="geografia">Geografia</option>
</select>

<button onclick="gerarProva()">Gerar 10 Questões</button>

<div id="area"></div>

</div>

<script>

let usadas = [];
let qstore = {};

// 🔊 VOZ
function falar(texto){
let msg = new SpeechSynthesisUtterance(texto);
msg.lang = "pt-BR";
speechSynthesis.speak(msg);
}

// EMBARALHAR
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

// GERAR QUESTÃO
function gerarQuestao(materia){

let pergunta, op, correta, explicacao, chave;

// PORTUGUÊS
if(materia=="portugues"){

let banco = [

{p:"Na frase 'Ele é uma fera estudando', o sentido é:",o:["Real","Figurado","Formal","Informal"],c:1,e:"Fera quer dizer muito bom."},
{p:"Qual é um substantivo?",o:["Correr","Casa","Bonito","Rápido"],c:1,e:"Casa é nome de coisa."},
{p:"Qual é um adjetivo?",o:["Casa","Bonito","Correr","Mesa"],c:1,e:"Adjetivo é característica."},
{p:"Qual está correto?",o:["Os menino feliz","Os meninos felizes","Menino felizes","Os menino felizs"],c:1,e:"Plural combina com plural."}

];

let q = banco[Math.floor(Math.random()*banco.length)];
pergunta=q.p; op=q.o; correta=q.c; explicacao=q.e;
chave = pergunta;

}

// MATEMÁTICA
if(materia=="matematica"){

let a = Math.floor(Math.random()*50);
let b = Math.floor(Math.random()*50);
let r = a+b;

pergunta = a+" + "+b+" = ?";
op = [r-1,r,r+1,r+2];
correta = 1;
explicacao = a+" + "+b+" = "+r;

chave = pergunta;

}

// CIÊNCIAS
if(materia=="ciencias"){
pergunta="A rotação da Terra causa:";
op=["Dia e noite","Chuva","Vento","Lua"];
correta=0;
explicacao="A Terra gira e temos dia e noite.";
chave=pergunta;
}

// HISTÓRIA
if(materia=="historia"){
pergunta="Os povos nômades:";
op=["Mudam de lugar","Cidade","Estado","Indústria"];
correta=0;
explicacao="Eles mudavam de lugar.";
chave=pergunta;
}

// GEOGRAFIA
if(materia=="geografia"){
pergunta="Desigualdade territorial é:";
op=["Diferença","Igualdade","Clima","Solo"];
correta=0;
explicacao="São diferenças.";
chave=pergunta;
}

// EVITAR REPETIR
if(usadas.includes(chave)) return gerarQuestao(materia);
usadas.push(chave);

// EMBARALHAR RESPOSTAS
let respostas = op.map((v,i)=>({txt:v,correta:i==correta}));
respostas = shuffle(respostas);
let novaCorreta = respostas.findIndex(r=>r.correta);

return {pergunta,respostas,correta:novaCorreta,explicacao};

}

// GERAR PROVA
function gerarProva(){

usadas = [];
qstore = {};

let materia = document.getElementById("materia").value;
let html = "";

for(let i=1;i<=10;i++){

let q = gerarQuestao(materia);

qstore[i]=q;

html += `<div class="questao">
<b>${i}. ${q.pergunta}</b><br>`;

q.respostas.forEach((r,index)=>{
html += `<label>
<input type="radio" name="q${i}" value="${index}"> ${r.txt}
</label><br>`;
});

html += `<div id="exp${i}" class="explicacao"></div></div>`;

}

html += `<button onclick="corrigir()">Corrigir</button>`;

document.getElementById("area").innerHTML = html;

}

// CORRIGIR
function corrigir(){

let acertos = 0;

for(let i=1;i<=10;i++){

let marcada = document.querySelector(`input[name=q${i}]:checked`);
let q = qstore[i];
let exp = document.getElementById("exp"+i);

if(marcada && parseInt(marcada.value)==q.correta){
acertos++;
exp.innerHTML="✅ Acertou!";
exp.style.color="green";
}else{
exp.innerHTML="❌ " + q.explicacao;
exp.style.color="red";

// 🔊 FALA A EXPLICAÇÃO
falar(q.explicacao);
}

}

alert("Você acertou "+acertos+" de 10");

}

</script>

</body>
</html>
