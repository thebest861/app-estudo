<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App IA Estudo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    padding:20px;
}

.container {
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.nivel {
    font-weight:bold;
    margin-bottom:10px;
}

.explicacao {
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🤖 App Inteligente</h2>

<div class="nivel" id="nivel">Nível 1</div>

<select id="materia">
<option value="portugues">Português</option>
<option value="matematica">Matemática</option>
<option value="ciencias">Ciências</option>
<option value="historia">História</option>
<option value="geografia">Geografia</option>
</select>

<button onclick="nova()">Nova Questão</button>

<div id="area"></div>

<canvas id="grafico"></canvas>

</div>

<script>

let nivel = 1;
let acertos = 0;
let erros = {portugues:0, matematica:0, ciencias:0, historia:0, geografia:0};

// 🔊 VOZ
function falar(txt){
let fala = new SpeechSynthesisUtterance(txt);
fala.lang="pt-BR";
speechSynthesis.speak(fala);
}

// 🎲 IA SIMULADA
function gerarQuestao(){

let materia = document.getElementById("materia").value;

let pergunta, op, correta, explicacao;

// MATEMÁTICA (fica mais difícil com nível)
if(materia=="matematica"){

let max = nivel * 20;

let a = Math.floor(Math.random()*max);
let b = Math.floor(Math.random()*max);

let r = a+b;

pergunta=`Quanto é ${a} + ${b}?`;
op=[r-1,r,r+1,r+2];
correta=1;
explicacao=`Somando ${a} + ${b} = ${r}`;
}

// PORTUGUÊS (variações)
if(materia=="portugues"){

let frases = [
"Ele é uma fera estudando",
"Ela voa nos estudos",
"Ele é um gênio estudando"
];

let f = frases[Math.floor(Math.random()*frases.length)];

pergunta=`Na frase "${f}", o sentido é:`;
op=["Real","Figurado","Formal","Informal"];
correta=1;
explicacao="Não é literal, quer dizer muito bom!";
}

// CIÊNCIAS
if(materia=="ciencias"){
pergunta="A Terra gira e causa:";
op=["Dia e noite","Chuva","Vento","Lua"];
correta=0;
explicacao="A rotação gera dia e noite.";
}

// HISTÓRIA
if(materia=="historia"){
pergunta="Os povos nômades:";
op=["Mudam de lugar","Cidade","Estado","Indústria"];
correta=0;
explicacao="Eles se movimentavam.";
}

// GEOGRAFIA
if(materia=="geografia"){
pergunta="Desigualdade é:";
op=["Diferença","Igualdade","Clima","Solo"];
correta=0;
explicacao="São diferenças.";
}

return {pergunta, op, correta, explicacao, materia};

}

// MOSTRAR
function nova(){

let q = gerarQuestao();

let html = `<h3>${q.pergunta}</h3>`;

q.op.forEach((o,i)=>{
html += `<button onclick="responder(${i},${q.correta},'${q.explicacao}','${q.materia}')">${o}</button>`;
});

html += `<div id="exp" class="explicacao"></div>`;

document.getElementById("area").innerHTML = html;

}

// RESPONDER
function responder(i, correta, explicacao, materia){

let exp = document.getElementById("exp");

if(i==correta){
acertos++;
exp.innerHTML="✅ Acertou!";
exp.style.color="green";

// subir nível
if(acertos % 5 == 0){
nivel++;
document.getElementById("nivel").innerHTML = "Nível " + nivel;
}
}else{
exp.innerHTML="❌ " + explicacao;
exp.style.color="red";
erros[materia]++;
falar(explicacao);
}

grafico();

}

// 📊 GRÁFICO
function grafico(){

let ctx = document.getElementById("grafico").getContext("2d");

new Chart(ctx,{
type:'bar',
data:{
labels:["Port","Mat","Cien","Hist","Geo"],
datasets:[{
data:[
erros.portugues,
erros.matematica,
erros.ciencias,
erros.historia,
erros.geografia
]
}]
}
});

}

</script>

</body>
</html>
